  <main>
    <main>
    <section class="contact-section">
        <div class="contact-container">
            <h2>Contactez-moi</h2>
            <p>Je suis basée à <strong>Lubumbashi</strong>. N'hésitez pas à me joindre pour toute collaboration !</p>

            <form action="#" method="post" class="contact-form">
                <div class="form-group">
                    <label for="nom">Nom Complet</label>
                    <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
                </div>

                <div class="form-group">
                    <label for="telephone">Numéro (WhatsApp / Telegram)</label>
                    <input type="tel" id="telephone" name="telephone" placeholder="+243..." required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Votre message..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Envoyer le message</button>
            </form>

            <div class="social-direct">
                <p>Ou contactez-moi directement sur :</p>
                <div class="social-icons-contact">
                    <a href="https://wa.me/VOTRE_NUMERO" target="_blank" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
                    <a href="https://t.me/VOTRE_USERNAME" target="_blank" title="Telegram"><i class="fa-brands fa-telegram"></i></a>
                </div>
            </div>
        </div>
    </section>
