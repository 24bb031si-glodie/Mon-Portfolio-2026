<body>
    <header>
        <div>
            <a href="">Mon Portfolio</a>

        <nav>
            <ul>
             <li><a href="index.html">Accueil</a></li>

             <li><a href="Contact.html"class="active">Contact</a></li>
            </ul>
        </nav>
    </header>
  <main class="contact-page">
    <div class="vibrant-blob blob-1"></div>
    <div class="vibrant-blob blob-2"></div>
    <div class="vibrant-blob blob-3"></div>

    <section class="contact-card">
        <div class="contact-header">
            <h1>Parlons de votre projet</h1>
            <p>Basée à <span class="location-tag"><i class="fa-solid fa-location-dot"></i> Lubumbashi</span>, je suis prête à collaborer avec vous partout dans le monde.</p>
        </div>

        <div class="contact-content">
            <form action="#" class="amazing-form">
                <div class="input-group">
                    <input type="text" id="name" required>
                    <label for="name">Nom Complet</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="input-group">
                    <input type="tel" id="phone" required>
                    <label for="phone">Numéro (WhatsApp / Telegram)</label>
                    <i class="fa-solid fa-phone"></i>
                </div>

                <div class="input-group">
                    <textarea id="msg" required></textarea>
                    <label for="msg">Votre Message</label>
                    <i class="fa-solid fa-comment-dots"></i>
                </div>

                <button type="submit" class="send-btn">
                    <span>Envoyer l'idée</span>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>

            <div class="quick-reach">
                <p>Réponse rapide via :</p>
                <div class="reach-icons">
                    <a href="https://wa.me/243XXXXXXXXX" class="reach-wa" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
                    <a href="https://t.me/ton_username" class="reach-tg" title="Telegram"><i class="fa-brands fa-telegram"></i></a>
                </div>
            </div>
        </div>
    </section>
</main>
    <footer>
        <div>
            <p>&copy;2026 Glodie. tous droits réservés.</p>
            <a href=""><i class="fa-brands fa-github"></i></a>

    </footer>
</body>
</html>
